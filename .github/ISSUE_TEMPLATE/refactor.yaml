name: Refactor/Code Quality
description: Suggest improvements for code structure, readability, or maintainability
title: "[Refactor]: "
labels: [refactor, code-quality]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the area of the codebase that could benefit from refactoring or code quality improvements.
  - type: input
    id: location
    attributes:
      label: Location
      description: File(s) or module(s) where refactoring is suggested.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: What changes do you recommend? (e.g., simplify logic, improve naming, remove duplication)
    validations:
      required: true
  - type: textarea
    id: benefit
    attributes:
      label: Benefit
      description: How will this refactor improve the codebase?
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information or references.
    validations:
      required: false
